<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="小鱼整理的 AI 资源、学习资料和灵感收藏。" />
    <title>资源 | 小鱼</title>
    <link rel="preload" href="styles.css" as="style" />
    <link rel="modulepreload" href="scripts/layout.js" />
    <link rel="modulepreload" href="scripts/utils.js" />
    <link rel="modulepreload" href="scripts/render-helpers.js" />
    <link rel="modulepreload" href="scripts/pages/resources.js" />
    <link rel="modulepreload" href="data/resources-data.js" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="script.js" data-page="resources"></script>
  </head>
  <body data-page="resources">
    <noscript><p style="text-align:center;padding:40px;">请启用 JavaScript 以查看此页面。</p></noscript>
    <div id="js-error" style="display:none;max-width:600px;margin:40px auto;padding:20px;background:#fff3cd;border:1px solid #ffc107;border-radius:8px;font-family:monospace;font-size:13px;color:#856404;"></div>
    <script>
      window.addEventListener("error", function(e) {
        var el = document.getElementById("js-error");
        if (el) {
          el.style.display = "block";
          el.innerHTML = "<strong>JS 错误：</strong><br>" + e.message + "<br><br><strong>文件：</strong>" + e.filename + ":" + e.lineno;
        }
      });
    </script>
  </body>
</html>
