<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">透明感夏日像素风插画</title>
  <desc id="desc">像素风的浅色天空、海面、站台和电线杆，适合作为个人网站首屏插画。</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop stop-color="#dff7ff" offset="0"/>
      <stop stop-color="#f8fdff" offset="0.52"/>
      <stop stop-color="#ffe6bf" offset="1"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#8bd8e7" offset="0"/>
      <stop stop-color="#b9eadc" offset="0.55"/>
      <stop stop-color="#fff2cb" offset="1"/>
    </linearGradient>
    <filter id="soft">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#4d9ead" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="960" height="720" rx="20" fill="url(#sky)"/>
  <g opacity=".72">
    <rect x="92" y="116" width="136" height="28" fill="#fff"/>
    <rect x="124" y="88" width="80" height="28" fill="#fff"/>
    <rect x="628" y="158" width="170" height="30" fill="#fff"/>
    <rect x="676" y="126" width="82" height="32" fill="#fff"/>
    <rect x="742" y="142" width="58" height="18" fill="#fff"/>
  </g>
  <g opacity=".72">
    <rect x="756" y="78" width="16" height="16" fill="#ffd98f"/>
    <rect x="772" y="94" width="16" height="16" fill="#ffd98f"/>
    <rect x="740" y="94" width="16" height="16" fill="#ffd98f"/>
    <rect x="756" y="110" width="16" height="16" fill="#ffd98f"/>
  </g>
  <rect x="0" y="348" width="960" height="372" fill="url(#sea)"/>
  <g opacity=".55">
    <rect x="64" y="394" width="180" height="10" fill="#ffffff"/>
    <rect x="320" y="430" width="260" height="10" fill="#ffffff"/>
    <rect x="650" y="382" width="160" height="10" fill="#ffffff"/>
    <rect x="120" y="502" width="310" height="12" fill="#ffffff"/>
    <rect x="600" y="536" width="230" height="12" fill="#ffffff"/>
  </g>
  <g filter="url(#soft)">
    <rect x="190" y="504" width="560" height="44" fill="#f6cc91"/>
    <rect x="214" y="548" width="512" height="34" fill="#2b5260"/>
    <rect x="246" y="468" width="72" height="36" fill="#ffffff" opacity=".82"/>
    <rect x="264" y="432" width="36" height="36" fill="#ffffff" opacity=".82"/>
    <rect x="250" y="548" width="24" height="104" fill="#244650"/>
    <rect x="666" y="548" width="24" height="104" fill="#244650"/>
  </g>
  <g fill="#38616d">
    <rect x="698" y="214" width="16" height="290"/>
    <rect x="658" y="246" width="96" height="12"/>
    <rect x="674" y="230" width="64" height="12"/>
    <rect x="754" y="258" width="20" height="24"/>
    <rect x="636" y="258" width="20" height="24"/>
  </g>
  <g stroke="#38616d" stroke-width="8" stroke-linecap="square" opacity=".62">
    <path d="M0 262 C180 214 300 276 460 236 S770 206 960 246" fill="none"/>
    <path d="M0 296 C200 250 332 306 492 270 S780 236 960 274" fill="none"/>
  </g>
  <g>
    <rect x="424" y="398" width="86" height="106" fill="#f8fbff"/>
    <rect x="438" y="416" width="24" height="30" fill="#8bd8e7"/>
    <rect x="472" y="416" width="24" height="30" fill="#8bd8e7"/>
    <rect x="430" y="504" width="74" height="12" fill="#eaa5a6"/>
    <rect x="444" y="384" width="48" height="14" fill="#2b5260"/>
  </g>
  <g opacity=".55">
    <rect x="96" y="642" width="768" height="10" fill="#fff"/>
    <rect x="144" y="666" width="640" height="8" fill="#fff"/>
  </g>
</svg>
